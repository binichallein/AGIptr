<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1320" viewBox="0 0 2200 1320" role="img" aria-labelledby="title desc">
  <title id="title">Qwen3.5 架构图（Transformer 论文风格）</title>
  <desc id="desc">Qwen3.5 核心层结构示意：N × (3 × (Gated DeltaNet → MLP Block) → 1 × (Gated Attention → MLP Block))。A 系列使用 MoE，Dense 系列使用 FFN。</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdfdff" />
      <stop offset="100%" stop-color="#f3f6ff" />
    </linearGradient>
    <linearGradient id="stackBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8f9ff" />
    </linearGradient>
    <linearGradient id="deltaBlock" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f61ff" />
      <stop offset="100%" stop-color="#384ad8" />
    </linearGradient>
    <linearGradient id="attnBlock" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3f8cff" />
      <stop offset="100%" stop-color="#2f6fdd" />
    </linearGradient>
    <linearGradient id="ffnBlock" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff" />
      <stop offset="100%" stop-color="#dfe6ff" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#4d5a9b" flood-opacity="0.18" />
    </filter>
    <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4f5573" />
    </marker>
    <marker id="residualArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#a06a00" />
    </marker>
  </defs>

  <rect x="0" y="0" width="2200" height="1320" fill="url(#pageBg)" />

  <text x="84" y="94" font-size="54" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#1f2442">Qwen3.5 架构图（Transformer 风格示意）</text>
  <text x="84" y="142" font-size="28" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#4d567a">核心布局：N × (3 × (Gated DeltaNet → MoE/FFN) → 1 × (Gated Attention → MoE/FFN))</text>

  <rect x="80" y="206" width="390" height="970" rx="22" fill="#ffffff" stroke="#dce1f7" stroke-width="3" filter="url(#softShadow)" />
  <text x="118" y="266" font-size="34" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#222944">输入与输出</text>

  <rect x="120" y="336" width="310" height="106" rx="16" fill="#f2f5ff" stroke="#cfd8ff" stroke-width="2.5" />
  <text x="275" y="385" text-anchor="middle" font-size="30" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#2a335e">Input Tokens</text>
  <text x="275" y="415" text-anchor="middle" font-size="20" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#606a92">文本 / 多模态输入</text>

  <rect x="120" y="492" width="310" height="106" rx="16" fill="#f2f5ff" stroke="#cfd8ff" stroke-width="2.5" />
  <text x="275" y="541" text-anchor="middle" font-size="30" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#2a335e">Embedding + RoPE</text>
  <text x="275" y="571" text-anchor="middle" font-size="20" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#606a92">词向量与位置编码</text>

  <rect x="120" y="1000" width="310" height="116" rx="16" fill="#f2f5ff" stroke="#cfd8ff" stroke-width="2.5" />
  <text x="275" y="1054" text-anchor="middle" font-size="30" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#2a335e">LM Head</text>
  <text x="275" y="1086" text-anchor="middle" font-size="20" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#606a92">生成 logits / 下游头</text>

  <line x1="275" y1="442" x2="275" y2="492" stroke="#4f5573" stroke-width="4" marker-end="url(#flowArrow)" />
  <line x1="275" y1="598" x2="275" y2="998" stroke="#4f5573" stroke-width="4" marker-end="url(#flowArrow)" />

  <rect x="530" y="206" width="1400" height="970" rx="24" fill="url(#stackBg)" stroke="#d6ddfa" stroke-width="3" filter="url(#softShadow)" />
  <text x="592" y="266" font-size="34" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#222944">Qwen3.5 主干（Decoder-Only Stack）</text>
  <text x="592" y="306" font-size="24" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#5a638b">每个 Stage 包含 4 个子层：3× DeltaNet 路径 + 1× Attention 路径</text>

  <rect x="596" y="352" width="1240" height="708" rx="20" fill="#ffffff" stroke="#bec7ee" stroke-width="3" stroke-dasharray="12 10" />
  <text x="636" y="404" font-size="30" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#2b335c">Stage（×N）</text>

  <rect x="670" y="450" width="120" height="96" rx="14" fill="#fff5dc" stroke="#f1c76d" stroke-width="2.5" />
  <text x="730" y="507" text-anchor="middle" font-size="22" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#7a5500">RMSNorm</text>

  <rect x="830" y="450" width="400" height="96" rx="14" fill="url(#deltaBlock)" />
  <text x="1030" y="509" text-anchor="middle" font-size="30" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#ffffff">Gated DeltaNet</text>

  <rect x="1270" y="450" width="430" height="96" rx="14" fill="url(#ffnBlock)" stroke="#aab6f2" stroke-width="2.5" />
  <text x="1485" y="492" text-anchor="middle" font-size="30" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#303f83">MoE / FFN Block</text>
  <text x="1485" y="526" text-anchor="middle" font-size="20" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#5b6797">A 系列：MoE · Dense 系列：FFN</text>

  <rect x="670" y="590" width="120" height="96" rx="14" fill="#fff5dc" stroke="#f1c76d" stroke-width="2.5" />
  <text x="730" y="647" text-anchor="middle" font-size="22" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#7a5500">RMSNorm</text>

  <rect x="830" y="590" width="400" height="96" rx="14" fill="url(#deltaBlock)" />
  <text x="1030" y="649" text-anchor="middle" font-size="30" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#ffffff">Gated DeltaNet</text>

  <rect x="1270" y="590" width="430" height="96" rx="14" fill="url(#ffnBlock)" stroke="#aab6f2" stroke-width="2.5" />
  <text x="1485" y="632" text-anchor="middle" font-size="30" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#303f83">MoE / FFN Block</text>
  <text x="1485" y="666" text-anchor="middle" font-size="20" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#5b6797">路由专家或稠密前馈</text>

  <rect x="670" y="730" width="120" height="96" rx="14" fill="#fff5dc" stroke="#f1c76d" stroke-width="2.5" />
  <text x="730" y="787" text-anchor="middle" font-size="22" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#7a5500">RMSNorm</text>

  <rect x="830" y="730" width="400" height="96" rx="14" fill="url(#deltaBlock)" />
  <text x="1030" y="789" text-anchor="middle" font-size="30" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#ffffff">Gated DeltaNet</text>

  <rect x="1270" y="730" width="430" height="96" rx="14" fill="url(#ffnBlock)" stroke="#aab6f2" stroke-width="2.5" />
  <text x="1485" y="772" text-anchor="middle" font-size="30" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#303f83">MoE / FFN Block</text>
  <text x="1485" y="806" text-anchor="middle" font-size="20" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#5b6797">第三个 Delta 路径</text>

  <rect x="670" y="870" width="120" height="96" rx="14" fill="#fff5dc" stroke="#f1c76d" stroke-width="2.5" />
  <text x="730" y="927" text-anchor="middle" font-size="22" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#7a5500">RMSNorm</text>

  <rect x="830" y="870" width="400" height="96" rx="14" fill="url(#attnBlock)" />
  <text x="1030" y="929" text-anchor="middle" font-size="30" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#ffffff">Gated Attention</text>

  <rect x="1270" y="870" width="430" height="96" rx="14" fill="url(#ffnBlock)" stroke="#aab6f2" stroke-width="2.5" />
  <text x="1485" y="912" text-anchor="middle" font-size="30" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#303f83">MoE / FFN Block</text>
  <text x="1485" y="946" text-anchor="middle" font-size="20" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#5b6797">注意力路径输出</text>

  <line x1="790" y1="498" x2="830" y2="498" stroke="#4f5573" stroke-width="4" marker-end="url(#flowArrow)" />
  <line x1="1230" y1="498" x2="1270" y2="498" stroke="#4f5573" stroke-width="4" marker-end="url(#flowArrow)" />

  <line x1="790" y1="638" x2="830" y2="638" stroke="#4f5573" stroke-width="4" marker-end="url(#flowArrow)" />
  <line x1="1230" y1="638" x2="1270" y2="638" stroke="#4f5573" stroke-width="4" marker-end="url(#flowArrow)" />

  <line x1="790" y1="778" x2="830" y2="778" stroke="#4f5573" stroke-width="4" marker-end="url(#flowArrow)" />
  <line x1="1230" y1="778" x2="1270" y2="778" stroke="#4f5573" stroke-width="4" marker-end="url(#flowArrow)" />

  <line x1="790" y1="918" x2="830" y2="918" stroke="#4f5573" stroke-width="4" marker-end="url(#flowArrow)" />
  <line x1="1230" y1="918" x2="1270" y2="918" stroke="#4f5573" stroke-width="4" marker-end="url(#flowArrow)" />

  <line x1="732" y1="546" x2="732" y2="590" stroke="#4f5573" stroke-width="4" marker-end="url(#flowArrow)" />
  <line x1="732" y1="686" x2="732" y2="730" stroke="#4f5573" stroke-width="4" marker-end="url(#flowArrow)" />
  <line x1="732" y1="826" x2="732" y2="870" stroke="#4f5573" stroke-width="4" marker-end="url(#flowArrow)" />

  <path d="M1728,498 C1776,498 1776,638 1728,638" fill="none" stroke="#a06a00" stroke-width="4" marker-end="url(#residualArrow)" />
  <path d="M1728,638 C1786,638 1786,778 1728,778" fill="none" stroke="#a06a00" stroke-width="4" marker-end="url(#residualArrow)" />
  <path d="M1728,778 C1796,778 1796,918 1728,918" fill="none" stroke="#a06a00" stroke-width="4" marker-end="url(#residualArrow)" />

  <text x="1810" y="636" font-size="20" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#946100">Residual</text>
  <text x="1810" y="664" font-size="20" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#946100">Skip Path</text>

  <line x1="430" y1="546" x2="596" y2="546" stroke="#4f5573" stroke-width="4.5" marker-end="url(#flowArrow)" />
  <line x1="1836" y1="918" x2="1980" y2="918" stroke="#4f5573" stroke-width="4.5" marker-end="url(#flowArrow)" />
  <line x1="1980" y1="918" x2="1980" y2="1058" stroke="#4f5573" stroke-width="4.5" marker-end="url(#flowArrow)" />
  <line x1="1980" y1="1058" x2="430" y2="1058" stroke="#4f5573" stroke-width="4.5" marker-end="url(#flowArrow)" />

  <rect x="560" y="1068" width="1320" height="92" rx="14" fill="#f8faff" stroke="#dbe2ff" stroke-width="2.5" />
  <text x="610" y="1122" font-size="27" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#2f3b71">输出序列继续进入下一 Stage，最顶层再接 RMSNorm + LM Head</text>

  <rect x="80" y="1194" width="2030" height="88" rx="16" fill="#ffffff" stroke="#dce1f7" stroke-width="2.5" />
  <rect x="118" y="1222" width="58" height="34" rx="8" fill="url(#deltaBlock)" />
  <text x="188" y="1247" font-size="24" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#2c345f">Gated DeltaNet</text>

  <rect x="500" y="1222" width="58" height="34" rx="8" fill="url(#attnBlock)" />
  <text x="570" y="1247" font-size="24" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#2c345f">Gated Attention</text>

  <rect x="950" y="1222" width="58" height="34" rx="8" fill="url(#ffnBlock)" stroke="#aab6f2" stroke-width="2" />
  <text x="1020" y="1247" font-size="24" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#2c345f">MoE / FFN</text>

  <rect x="1320" y="1222" width="58" height="34" rx="8" fill="#fff5dc" stroke="#f1c76d" stroke-width="2" />
  <text x="1390" y="1247" font-size="24" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#2c345f">RMSNorm</text>

  <line x1="1678" y1="1239" x2="1736" y2="1239" stroke="#a06a00" stroke-width="4" marker-end="url(#residualArrow)" />
  <text x="1748" y="1247" font-size="24" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#2c345f">Residual / Skip</text>
</svg>
