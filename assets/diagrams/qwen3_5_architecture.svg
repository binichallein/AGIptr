<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Qwen3.5 架构示意图</title>
  <desc id="desc">基于 Qwen 官方模型卡公开信息绘制：Gated DeltaNet 与 Gated Attention 交替堆叠，A 系列结合 MoE，Dense 系列结合 FFN。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8f9ff" />
      <stop offset="100%" stop-color="#eef1ff" />
    </linearGradient>
    <linearGradient id="block" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#5c6cff" />
      <stop offset="100%" stop-color="#4657e8" />
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#5a5d75" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="640" fill="url(#bg)" />
  <text x="40" y="56" font-size="30" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#1f2333">Qwen3.5 架构示意（官方信息整理）</text>
  <text x="40" y="88" font-size="16" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#4a5066">核心模式：N × (3 × (Gated DeltaNet → Block) → 1 × (Gated Attention → Block))</text>

  <rect x="40" y="220" rx="16" ry="16" width="170" height="92" fill="#ffffff" stroke="#cfd5f4" stroke-width="2" />
  <text x="125" y="260" text-anchor="middle" font-size="20" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#242843">输入 Token</text>
  <text x="125" y="286" text-anchor="middle" font-size="13" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#636a84">文本 / 视觉编码</text>

  <rect x="250" y="145" rx="18" ry="18" width="720" height="256" fill="#ffffff" stroke="#cfd5f4" stroke-width="2" />
  <text x="610" y="184" text-anchor="middle" font-size="24" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#29304f">重复 Stage（N 次）</text>

  <rect x="290" y="220" rx="12" ry="12" width="140" height="66" fill="url(#block)" />
  <text x="360" y="258" text-anchor="middle" font-size="14" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Gated DeltaNet</text>

  <rect x="450" y="220" rx="12" ry="12" width="120" height="66" fill="#f4f6ff" stroke="#8d96d8" stroke-width="2" />
  <text x="510" y="248" text-anchor="middle" font-size="14" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#33395d" font-weight="700">Block A</text>
  <text x="510" y="268" text-anchor="middle" font-size="12" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#66709a">MoE / FFN</text>

  <rect x="590" y="220" rx="12" ry="12" width="140" height="66" fill="url(#block)" />
  <text x="660" y="258" text-anchor="middle" font-size="14" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Gated DeltaNet</text>

  <rect x="750" y="220" rx="12" ry="12" width="120" height="66" fill="#f4f6ff" stroke="#8d96d8" stroke-width="2" />
  <text x="810" y="248" text-anchor="middle" font-size="14" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#33395d" font-weight="700">Block A</text>
  <text x="810" y="268" text-anchor="middle" font-size="12" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#66709a">MoE / FFN</text>

  <rect x="360" y="304" rx="12" ry="12" width="140" height="66" fill="url(#block)" />
  <text x="430" y="342" text-anchor="middle" font-size="14" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Gated DeltaNet</text>

  <rect x="520" y="304" rx="12" ry="12" width="120" height="66" fill="#f4f6ff" stroke="#8d96d8" stroke-width="2" />
  <text x="580" y="332" text-anchor="middle" font-size="14" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#33395d" font-weight="700">Block A</text>
  <text x="580" y="352" text-anchor="middle" font-size="12" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#66709a">MoE / FFN</text>

  <rect x="660" y="304" rx="12" ry="12" width="160" height="66" fill="#3340d8" />
  <text x="740" y="342" text-anchor="middle" font-size="14" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Gated Attention</text>

  <rect x="840" y="304" rx="12" ry="12" width="120" height="66" fill="#f4f6ff" stroke="#8d96d8" stroke-width="2" />
  <text x="900" y="332" text-anchor="middle" font-size="14" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#33395d" font-weight="700">Block B</text>
  <text x="900" y="352" text-anchor="middle" font-size="12" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#66709a">MoE / FFN</text>

  <line x1="210" y1="266" x2="246" y2="266" stroke="#5a5d75" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="430" y1="253" x2="446" y2="253" stroke="#5a5d75" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="570" y1="253" x2="586" y2="253" stroke="#5a5d75" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="730" y1="253" x2="746" y2="253" stroke="#5a5d75" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="810" y1="286" x2="810" y2="298" stroke="#5a5d75" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="500" y1="337" x2="516" y2="337" stroke="#5a5d75" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="640" y1="337" x2="656" y2="337" stroke="#5a5d75" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="820" y1="337" x2="836" y2="337" stroke="#5a5d75" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="970" y1="337" x2="1030" y2="337" stroke="#5a5d75" stroke-width="3" marker-end="url(#arrow)" />

  <rect x="1038" y="292" rx="16" ry="16" width="122" height="90" fill="#ffffff" stroke="#cfd5f4" stroke-width="2" />
  <text x="1099" y="330" text-anchor="middle" font-size="20" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#242843">输出</text>
  <text x="1099" y="355" text-anchor="middle" font-size="13" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#636a84">生成结果</text>

  <rect x="40" y="460" rx="12" ry="12" width="1120" height="136" fill="#ffffff" stroke="#d8ddf8" stroke-width="1.5" />
  <text x="64" y="493" font-size="16" font-family="Inter, 'Noto Sans SC', sans-serif" font-weight="700" fill="#2c3456">图例与说明</text>
  <text x="64" y="520" font-size="14" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#4b557a">• A 系列（例如 397B-A17B / 122B-A10B / 35B-A3B）中的 Block 为 MoE；Dense 系列（27B / 9B / 4B / 2B / 0.8B）中的 Block 为 FFN。</text>
  <text x="64" y="546" font-size="14" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#4b557a">• 官方模型卡给出的 Hidden Layout 示例：15×/12×/10×/16×/8×/6× 等重复次数会随模型规模变化。</text>
  <text x="64" y="572" font-size="13" font-family="Inter, 'Noto Sans SC', sans-serif" fill="#70789a">来源：Qwen 官方 Hugging Face 模型卡（Qwen3.5 系列）与官方博客入口链接（https://qwen.ai/blog?id=qwen3.5）。</text>
</svg>
